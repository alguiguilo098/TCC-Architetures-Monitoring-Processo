syntax = "proto3";

package ProcessMetricas;




message ProcessMetrics {
  // Campos básicos do processo
  int32 pid = 1; // IMPLEMENTADO                          
  string name = 2; // IMPLEMENTADO          
  string user = 3; // IMPLEMENTADO        
  optional int32 num_threads = 7; // IMPLEMENTADO      
  optional int32 num_child_processes = 9; // IMPLEMENTADO   
  
  // CPU                 
  optional float cpu_percent = 8; // IMPLEMENTADO
  // Memória
  optional float memory_percent = 10; // IMPLEMENTADO
  uint64 mem_rss_kb = 23; // IMPLEMENTADO
  uint64 mem_uss_kb = 24; 
  uint64 mem_shared_kb = 25; // IMPLEMENTADO
  uint64 mem_vms_kb = 26; // IMPLEMENTADO
  uint64 mem_text_kb = 27; // IMPLEMENTADO
  uint64 read_bytes_kb = 11;  // IMPLEMENTADO
  uint64 write_bytes_kb = 12; // IMPLEMENTADO 

  // Campos de I/O
  optional int32 num_fds = 13; // IMPLEMENTADO                    
  int32 nice = 14; // IMPLEMENTADO
  int32 ionice_value = 20;

  // Campos de timestamp
  string timestamp = 4; // IMPLEMENTADO
  string boottime = 15; // IMPLEMENTADO
  string timestartprocess = 16; // IMPLEMENTADO
  
  // Network                 
  
  // Status
  bool is_sleep = 28;
  // Rede
  
  // Identidade e permissões
  int32 gid_effective = 21; 
  
  
}

message ProcessMetricsList {
  string hostip = 17; 
  float kb_received = 18;
  float kb_sent = 19;
  repeated ProcessMetrics processes = 1;  
};

message KernelDistro {
  string timestamp = 3; // Timestamp da coleta
  string kernel_version = 1; // Versão do kernel
  string distro_name = 2; // Nome da distribuição
  string hostip= 17; // IP do host
}

// Mensagem que representa um programa instalado
message InstalledProgram {
  string name = 1;       // Nome do pacote/programa
  string version = 2;    // Versão do pacote/programa
}

// Mensagem que representa a lista de todos os programas
message InstalledProgramList {
  string timestamp = 3; // Timestamp da coleta
  string hostip= 2; // IP do host
  repeated InstalledProgram programs = 1;  // Lista de programas
}



